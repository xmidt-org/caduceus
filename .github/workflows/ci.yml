---
name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
      - CONTRIBUTING.md
      - MAINTAINERS.md
      - LICENSE
      - NOTICE
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  pull_request:
  workflow_dispatch:

permissions:
  pull-requests: read
  contents: write
  packages: write

jobs:
  ci:
    # yamllint disable-line
    uses: xmidt-org/shared-go/.github/workflows/ci.yml@7784bd625f0c7ea53db2c857f9ab33e42ad77b95 # v4.12.13
    with:
      release-type:          program
      release-arch-amd64:    true
      release-arch-arm64:    true
      release-docker:        true
      release-docker-latest: true
      release-docker-major:  true
      release-docker-minor:  true
      release-docker-extras: |
        .release/docker
        LICENSE
        NOTICE
      yaml-lint-skip: false
    secrets: inherit
